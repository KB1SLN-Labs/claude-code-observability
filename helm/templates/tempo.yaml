---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-tempo-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-observability.labels" . | nindent 4 }}
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317

    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: {{ .Values.tempo.retention }}

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    # Generate RED span metrics (latency histograms, call/error counts) from
    # spans and remote-write them to Prometheus, so trace-derived latency can be
    # charted with PromQL alongside the rest of the metrics.
    metrics_generator:
      registry:
        external_labels:
          source: tempo
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://{{ include "claude-code-observability.prometheusHost" . }}:9090/api/v1/write
            send_exemplars: true
      traces_storage:
        path: /var/tempo/generator/traces

    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-tempo-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-observability.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.tempo.persistence.size }}
  {{- include "claude-code-observability.storageClassName" .Values.tempo.persistence.storageClass | nindent 2 }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-tempo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-observability.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Recreate (not RollingUpdate): single-writer ReadWriteOnce data PVC —
  # a surging new pod would conflict with the old one on the volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}-tempo
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-tempo
    spec:
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: tempo
          image: {{ .Values.tempo.image }}
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - containerPort: 3200
            - containerPort: 4317
            - containerPort: 4318
          resources:
            {{- toYaml .Values.tempo.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-tempo-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-tempo-data

---
# Internal only — Grafana and the OTel Collector reach this via ClusterIP.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-code-observability.tempoHost" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-observability.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
