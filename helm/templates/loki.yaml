---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-loki-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-observability.labels" . | nindent 4 }}
data:
  config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-loki-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-observability.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.loki.persistence.size }}
  {{- include "claude-code-observability.storageClassName" .Values.loki.persistence.storageClass | nindent 2 }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-loki
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-observability.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Recreate (not RollingUpdate): single-writer ReadWriteOnce data PVC —
  # a surging new pod would conflict with the old one on the volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}-loki
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-loki
    spec:
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: loki
          image: {{ .Values.loki.image }}
          args: ["-config.file=/etc/loki/config.yaml"]
          ports:
            - containerPort: 3100
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-loki-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-loki-data

---
# Internal only — Grafana and the OTel Collector reach this via ClusterIP.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-code-observability.lokiHost" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-observability.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-loki
  ports:
    - port: 3100
      targetPort: 3100
