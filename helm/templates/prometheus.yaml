---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-prometheus-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-observability.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.prometheus.persistence.size }}
  {{- include "claude-code-observability.storageClassName" .Values.prometheus.persistence.storageClass | nindent 2 }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-observability.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the data PVC is ReadWriteOnce and the TSDB
  # holds a single-writer lock, so a surging new pod would crash on the lock
  # held by the old one. Terminate old before starting new.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}-prometheus
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-prometheus
    spec:
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.prometheus.retention }}"
            - "--web.enable-remote-write-receiver"
          ports:
            - containerPort: 9090
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /prometheus
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-prometheus-data

---
# Internal only — Grafana and the OTel Collector reach this via ClusterIP.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-code-observability.prometheusHost" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-observability.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-prometheus
  ports:
    - port: 9090
      targetPort: 9090
