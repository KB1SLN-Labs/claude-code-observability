## OTel Collector
otelCollector:
  image: otel/opentelemetry-collector-contrib:0.102.0
  service:
    type: LoadBalancer
    annotations: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

## Prometheus
prometheus:
  image: prom/prometheus:v2.52.0
  retention: 30d
  persistence:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 750m
      memory: 1Gi

## Loki
loki:
  image: grafana/loki:3.0.0
  persistence:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

## Tempo (traces backend)
## The trace store, peer of Prometheus (metrics) and Loki (logs). Both Claude
## Code and the interactive Codex app emit OpenTelemetry traces; this is where
## they land. Tempo also generates RED span metrics (latency histograms) that
## are remote-written to Prometheus so trace latency can be charted with PromQL.
tempo:
  image: grafana/tempo:2.5.0
  retention: 168h
  persistence:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

## Dynatrace (optional fan-out exporter)
## To enable, create a Secret with DT_OTLP_ENDPOINT and DT_API_TOKEN keys,
## then set enabled: true and secretName to match. Use a local values override
## (e.g. values.local.yaml, gitignored) to keep credentials out of source control.
dynatrace:
  enabled: false
  secretName: ""

## Grafana
grafana:
  image: grafana/grafana:11.0.0
  service:
    type: LoadBalancer
    annotations: {}
  persistence:
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 600m
      memory: 256Mi

