extensions:
  basicauth/prometheus:
    client_auth:
      username: "${env:GC_PROMETHEUS_USER}"
      password: "${env:GC_API_TOKEN}"
  basicauth/loki:
    client_auth:
      username: "${env:GC_LOKI_USER}"
      password: "${env:GC_API_TOKEN}"

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  prometheusremotewrite:
    endpoint: "${env:GC_PROMETHEUS_ENDPOINT}"
    auth:
      authenticator: basicauth/prometheus
    tls:
      insecure: false

  loki:
    endpoint: "${env:GC_LOKI_ENDPOINT}"
    auth:
      authenticator: basicauth/loki
    default_labels_enabled:
      exporter: false
      job: true

service:
  extensions: [basicauth/prometheus, basicauth/loki]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki]
